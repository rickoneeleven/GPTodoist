# DATETIME of last agent review: 18 Mar 2026 09:59 (Europe/London)

project:
  name: GPTodoist
  type: python-cli
  summary: Interactive Todoist CLI with long-term task workflows and optional shared status publishing.

entrypoints:
  app:
    - path: main.py
      role: interactive command loop
  workers:
    - name: pinescore-status-push
      path: helper_pinescore_status.py
      trigger: optional background thread started by main.py every PINESCOREDATA_BACKGROUND_INTERVAL_SECONDS

runtime:
  services: []
  timers: []
  env_files:
    - shell environment variables only (no committed .env file)
  state_paths:
    - backups/
    - j_options.json
    - j_todoist_filters.json
    - j_active_task.json
    - j_todays_completed_tasks.json
    - j_number_of_todays_completed_tasks.json
    - j_diary.json
    - j_function_calls.json
    - j_regular_hidden.json
    - j_long_hidden.json
    - j_recurring_anomalies.json
  health_checks:
    - "python3 -m py_compile $(git ls-files '*.py')"
    - "python3 -m unittest discover -s tests -p 'test_*.py'"

data:
  stores:
    - Local JSON files in repo root
    - Todoist task/project state via HTTPS API
    - Optional shared status state at data.pinescore.com
  key_runtime_tables:
    - todo.tasks_up_to_date
    - todo.tasks_background_owner_device_id

integrations:
  - name: api.todoist.com/api/v1
    purpose: task CRUD, filtering, quick add, and project lookup
  - name: data.pinescore.com/v1
    purpose: optional status hub with ETag + If-Match state updates

testing:
  default_commands:
    - "python3 -m py_compile $(git ls-files '*.py')"
    - "python3 -m unittest discover -s tests -p 'test_*.py'"

deploy:
  restart:
    - Stop the current process and run `python3 main.py` from repo root.
  post_deploy_checks:
    - "python3 -m py_compile $(git ls-files '*.py')"
    - "python3 -m unittest discover -s tests -p 'test_*.py'"

open_on_demand:
  - ops/TESTING.md
  - ops/runtime.md
  - ops/api_guide.txt

gotchas:
  - TODOIST_API_KEY is read at import time in main.py; missing it prevents startup.
  - Long-term commands require a Todoist project named exactly "Long Term Tasks".
  - Keep Todoist endpoints on /api/v1; /rest/v2 usage returns HTTP 410.
  - Background pinescore pushes are owner-gated by todo.tasks_background_owner_device_id.
  - Hourly backup copies all root *.json files and prunes backups older than 10 days.
  - Commands are blocked when active-task device id differs from local device id.
